<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* Hide horizontal scrollbar */
}

.background-image {
  background-image: url('./backgroundBoxes..webp'); /* Replace 'your-image.jpg' with your image file */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  z-index: -1; /* Ensure the background is behind other content */
}

.content {
  padding: 20px;
  margin-top: 100vh; /* Adjust this value based on the height of your background image */
}

  </style>
  <title>Scrolling Image</title>
</head>
<body>
  <div class="background-image"></div>
  <div class="content">
    <!-- Your content goes here -->
    <h1>Your Content</h1>
    <p>Scroll down to see the effect</p>
  </div>
</body>
</html>
